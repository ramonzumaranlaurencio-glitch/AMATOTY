<style>
/* ════════════════════════════════════════════════════════
   VIRAL DEALS – TikTok-style vertical swipe feed
   ════════════════════════════════════════════════════════ */
:root{
  --wmt:#0071ce; --wmt2:#004c8e;
  --amz:#ff9900; --amz2:#e67e00;
  --neon:#00d4ff; --neon2:#7c3aed;
  --pink:#ff006e; --green:#39ff14;
  --dark:#050810; --dark2:#0a0e1a;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.1);
  --text:#f1f5f9; --text2:#94a3b8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--dark);color:var(--text);font-family:-apple-system,'Segoe UI',Arial,sans-serif;height:100%;overflow:hidden;overscroll-behavior:none}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font:inherit;border:none;background:none}

/* ── PROGRESS BAR ── */
#progress-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--neon),var(--pink));z-index:2000;transition:width .15s;box-shadow:0 0 8px var(--neon);pointer-events:none}

/* ── TOP NAV ── */
#top-nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:env(safe-area-inset-top,0) 16px 0;
  background:linear-gradient(to bottom,rgba(5,8,16,.96) 0%,transparent 100%);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.nav-inner{display:flex;align-items:center;gap:10px;height:52px}
.nav-brand{
  font-size:19px;font-weight:900;white-space:nowrap;flex-shrink:0;
  background:linear-gradient(135deg,#fff,var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex:1;padding:0 4px}
.nav-cats::-webkit-scrollbar{display:none}
.cat-pill{
  flex-shrink:0;background:var(--glass);border:1px solid var(--border);
  border-radius:999px;padding:5px 14px;font-size:11px;font-weight:800;
  color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap;
}
.cat-pill:hover,.cat-pill.active{background:rgba(0,212,255,.18);border-color:var(--neon);color:var(--neon)}
.nav-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.nav-btn{
  width:36px;height:36px;border-radius:50%;background:var(--glass);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:all .15s;cursor:pointer;
}
.nav-btn:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.25)}

/* ── MAIN FEED ── */
#feed{
  height:100dvh;overflow-y:scroll;
  scroll-snap-type:y mandatory;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
}
#feed::-webkit-scrollbar{display:none}

/* ── SLIDE ── */
.slide{
  height:100dvh;width:100%;scroll-snap-align:start;
  position:relative;overflow:hidden;
  display:flex;align-items:flex-end;
  contain:strict;
}

/* ── BACKGROUND ── */
.slide-bg{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transition:transform .7s ease;
  will-change:transform;
}
.slide.active .slide-bg{transform:scale(1.05)}
.slide-bg-grad{position:absolute;inset:0;background:var(--grad,linear-gradient(135deg,#0a0e1a,#1a0520))}

/* ── OVERLAYS ── */
.slide-overlay{
  position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(to top,rgba(5,8,16,.96) 0%,rgba(5,8,16,.55) 38%,transparent 65%),
    linear-gradient(to bottom,rgba(5,8,16,.5) 0%,transparent 25%);
}
.glow-orb{
  position:absolute;border-radius:50%;filter:blur(90px);
  pointer-events:none;opacity:.22;
}

/* ── SIDEBAR (TikTok right) ── */
.slide-sidebar{
  position:absolute;right:14px;bottom:210px;
  display:flex;flex-direction:column;gap:18px;align-items:center;z-index:10;
}
.side-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:transform .15s;
}
.side-btn:hover{transform:scale(1.12)}
.side-icon{
  width:48px;height:48px;background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:all .18s;
}
.side-btn.liked .side-icon{background:rgba(255,0,110,.3);border-color:#ff006e;box-shadow:0 0 16px rgba(255,0,110,.4)}
.side-label{font-size:10px;color:#fff;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.7)}

/* ── BOTTOM INFO ── */
.slide-info{
  position:relative;z-index:10;width:100%;
  padding:0 16px 20px;
  padding-bottom:max(20px,env(safe-area-inset-bottom,20px));
  padding-right:72px; /* avoid sidebar */
}
.slide-section-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,212,255,.14);border:1px solid rgba(0,212,255,.3);
  border-radius:999px;padding:3px 12px;font-size:11px;font-weight:800;
  color:var(--neon);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;
}
.badge{
  display:inline-block;padding:2px 8px;border-radius:6px;
  font-size:10px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;margin-left:6px;
}
.badge.viral{background:linear-gradient(135deg,#ee1d52,#69c9d0);color:#fff}
.badge.hot{background:#ef4444;color:#fff}
.badge.deal{background:#f59e0b;color:#111}
.badge.new{background:#10b981;color:#fff}
.badge.cheap{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff}

.slide-name{
  font-size:clamp(20px,5vw,28px);font-weight:900;line-height:1.2;
  color:#fff;margin-bottom:6px;text-shadow:0 2px 10px rgba(0,0,0,.7);
}
.slide-benefit{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:10px;line-height:1.4;max-width:300px}
.slide-price-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.slide-price{font-size:28px;font-weight:900;color:#fff;letter-spacing:-.5px}
.slide-orig{font-size:13px;color:rgba(255,255,255,.45);text-decoration:line-through}
.slide-disc{background:#ef4444;color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900}
.slide-rating{display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:13px}
.slide-stars{color:#f59e0b;letter-spacing:1px;font-size:14px}
.slide-reviews{color:rgba(255,255,255,.45);font-size:11px}

/* ── CTA BUTTONS ── */
.slide-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px}
.btn-wmt{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(135deg,var(--wmt),var(--wmt2));color:#fff;
  border-radius:12px;padding:13px 10px;font-size:14px;font-weight:800;
  box-shadow:0 4px 18px rgba(0,113,206,.45);
  transition:all .18s;white-space:nowrap;text-align:center;
}
.btn-wmt:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,113,206,.65);color:#fff}
.btn-amz{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(135deg,var(--amz),var(--amz2));color:#111;
  border-radius:12px;padding:13px 10px;font-size:14px;font-weight:800;
  box-shadow:0 4px 18px rgba(255,153,0,.45);
  transition:all .18s;white-space:nowrap;text-align:center;
}
.btn-amz:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,153,0,.65);color:#111}
.slide-disclosure{font-size:9px;color:rgba(255,255,255,.25);margin-top:8px}
.slide-disclosure a{color:rgba(0,212,255,.4)}

/* ── SWIPE HINT ── */
.swipe-hint{
  position:absolute;bottom:130px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  animation:bounceUp 1.4s infinite ease-in-out;
  transition:opacity .5s;pointer-events:none;z-index:20;
}
.swipe-hint .sh-arrow{font-size:26px;filter:drop-shadow(0 0 8px rgba(0,212,255,.7))}
.swipe-hint span{font-size:10px;color:rgba(255,255,255,.7);font-weight:800;letter-spacing:1.5px}
@keyframes bounceUp{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}

/* ── SECTION HEADER SLIDE ── */
.slide.sec-header{justify-content:center;align-items:center}
.sec-inner{text-align:center;padding:40px 24px;z-index:10;position:relative;max-width:420px;margin:0 auto}
.sec-icon{font-size:64px;margin-bottom:16px;line-height:1;filter:drop-shadow(0 0 24px rgba(0,212,255,.5))}
.sec-title{
  font-size:clamp(28px,8vw,52px);font-weight:900;line-height:1.1;margin-bottom:12px;
  background:linear-gradient(135deg,#fff 20%,var(--neon) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sec-sub{font-size:16px;color:var(--text2);max-width:300px;margin:0 auto 24px;line-height:1.6}
.sec-cta{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.35);
  border-radius:999px;padding:10px 28px;font-size:13px;font-weight:800;
  color:var(--neon);cursor:pointer;
  animation:glowPulse 2s infinite;
}
@keyframes glowPulse{0%,100%{box-shadow:0 0 14px rgba(0,212,255,.25)}50%{box-shadow:0 0 32px rgba(0,212,255,.6)}}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(10,14,26,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:999px;
  padding:10px 22px;font-size:13px;font-weight:700;color:#fff;
  z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;
}
#toast.show{opacity:1}

/* ── WISHLIST PANEL ── */
#wl-panel{position:fixed;inset:0;z-index:5000;display:none}
#wl-panel.open{display:flex;flex-direction:column;justify-content:flex-end}
.wl-overlay{position:absolute;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.wl-drawer{
  position:relative;width:100%;max-height:82vh;
  background:#0d1b2e;border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);padding:20px;overflow-y:auto;
}
.wl-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.wl-title{
  font-size:18px;font-weight:900;margin-bottom:16px;
  background:linear-gradient(135deg,#fff,var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.wl-empty{color:#64748b;text-align:center;padding:24px 0;font-size:14px}
.wl-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.wl-item img{width:54px;height:54px;object-fit:contain;border-radius:10px;background:rgba(255,255,255,.06);flex-shrink:0}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wl-price{font-size:14px;font-weight:900;color:var(--amz)}
.wl-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.wl-btn{font-size:11px;font-weight:800;border-radius:8px;padding:5px 10px;white-space:nowrap}
.wl-btn.wmt{background:var(--wmt);color:#fff}
.wl-btn.amz{background:var(--amz);color:#111}
.wl-close-btn{
  margin-top:16px;width:100%;padding:12px;border-radius:12px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;
}

/* ── RESPONSIVE ── */
@media(max-width:400px){
  .slide-btns{grid-template-columns:1fr}
  .btn-wmt,.btn-amz{padding:12px;font-size:13px}
  .slide-info{padding-right:68px}
}
@media(min-width:700px){
  #feed{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}
  .slide-btns{max-width:340px}
}
</style>

// ─────────────────────────────────────────────────────────────────────────────
// WISHLIST (localStorage)
// ─────────────────────────────────────────────────────────────────────────────
let wishlist = [];
try { wishlist = JSON.parse(localStorage.getItem('viral_wl_v1') || '[]'); } catch(_) {}
function saveWL() { try { localStorage.setItem('viral_wl_v1', JSON.stringify(wishlist)); } catch(_) {} }
function isWL(idx) { return wishlist.some(w => w.idx === idx); }

function toggleWL(idx) {
  const p = PRODUCTS[idx];
  if (isWL(idx)) {
    wishlist = wishlist.filter(w => w.idx !== idx);
    showToast('💔 Removed from wishlist');
  } else {
    wishlist.push({ idx, name: p.name, price: p.price, img: p.img || '', amz: p.amz, wmt: p.wmt });
    showToast('❤️ Saved to wishlist!');
  }
  saveWL();
  const btn = document.querySelector(`[data-wl="${idx}"]`);
  if (btn) btn.classList.toggle('liked', isWL(idx));
}

function openWishlist() {
  const panel = document.getElementById('wl-panel');
  const items = document.getElementById('wl-items');
  if (!wishlist.length) {
    items.innerHTML = '<p class="wl-empty">No items yet — heart a product to save it! ❤️</p>';
  } else {
    items.innerHTML = wishlist.map(w => `
      <div class="wl-item">
        <img src="${w.img || 'assets/placeholder.png'}" alt="" onerror="this.src='assets/placeholder.png'">
        <div class="wl-info">
          <div class="wl-name">${w.name}</div>
          <div class="wl-price">${w.price}</div>
        </div>
        <div class="wl-btns">
          <a class="wl-btn wmt" href="${wmtUrl(w.wmt)}" target="_blank" rel="nofollow sponsored noopener noreferrer">Walmart</a>
          <a class="wl-btn amz" href="${amzUrl(w.amz)}" target="_blank" rel="nofollow sponsored noopener noreferrer">Amazon</a>
        </div>
      </div>`).join('');
  }
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeWishlist() {
  document.getElementById('wl-panel').classList.remove('open');
  document.body.style.overflow = '';
}

// ─────────────────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────────────────
let _toastTmr;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTmr);
  _toastTmr = setTimeout(() => t.classList.remove('show'), 2600);
}

// BUILD FEED
// ─────────────────────────────────────────────────────────────────────────────
const BADGE_MAP = { viral:'📱 VIRAL', hot:'🔥 HOT', deal:'💰 DEAL', new:'✨ NEW', cheap:'✨ LUXURY' };
let allSlides = [];
let currentIdx = 0;

function buildFeed() {
  const feed = document.getElementById('feed');
  const catNav = document.getElementById('nav-cats');

  // Category pills
  catNav.innerHTML = SECTIONS.map((sec, i) =>
    `<button class="cat-pill${i===0?' active':''}" data-sec="${sec.id}" onclick="jumpTo('${sec.id}')">${sec.label}</button>`
  ).join('');

  // Build all slide HTML
  let html = '';

  SECTIONS.forEach(sec => {
    const secProds = PRODUCTS.filter(p => p.s === sec.id);

    // ── Section header slide ──
    html += `
    <div class="slide sec-header" id="sec-${sec.id}" data-sec="${sec.id}">
      <div class="slide-bg-grad" style="--grad:${sec.grad}"></div>
      <div class="glow-orb" style="width:320px;height:320px;background:${sec.glow};top:35%;left:50%;transform:translate(-50%,-50%)"></div>
      <div class="slide-overlay"></div>
      <div class="sec-inner">
        <div class="sec-icon">${sec.icon}</div>
        <div class="sec-title">${sec.title}</div>
        <div class="sec-sub">${sec.sub}</div>
        <div class="sec-cta">Swipe up to discover ↑</div>
      </div>
    </div>`;

    // ── Product slides ──
    secProds.forEach((p, localIdx) => {
      const globalIdx = PRODUCTS.indexOf(p);
      const stars = '★'.repeat(Math.min(5, Math.round(p.rating))) + '☆'.repeat(Math.max(0, 5 - Math.round(p.rating)));
      const secLabel = SECTIONS.find(s => s.id === p.s)?.label || '';

      html += `
    <div class="slide" data-idx="${globalIdx}" data-sec="${p.s}">
      ${p.img
        ? `<img class="slide-bg" src="${p.img}" alt="${p.name}" loading="lazy" decoding="async" onerror="this.style.display='none';this.nextElementSibling.style.removeProperty('display')">`
        : ''}
      <div class="slide-bg-grad" style="${p.img ? 'display:none;' : ''}--grad:${p.grad}"></div>
      <div class="slide-overlay"></div>

      <div class="slide-sidebar">
        <div class="side-btn ${isWL(globalIdx)?'liked':''}" data-wl="${globalIdx}" onclick="toggleWL(${globalIdx})" role="button" aria-label="Save to wishlist" tabindex="0">
          <div class="side-icon">❤️</div>
          <span class="side-label">${p.rev || '10K'}</span>
        </div>
        <div class="side-btn" onclick="shareProduct(${globalIdx})" role="button" aria-label="Share product" tabindex="0">
          <div class="side-icon">📤</div>
          <span class="side-label">Share</span>
        </div>
        <a class="side-btn" href="${amzUrl(p.amz, p.asin||'')}" target="_blank" rel="nofollow sponsored noopener noreferrer" aria-label="Buy on Amazon">
          <div class="side-icon">🛒</div>
          <span class="side-label">Buy</span>
        </a>
      </div>

      <div class="slide-info">
        <div class="slide-section-tag">
          ${secLabel}
          ${p.badge ? `<span class="badge ${p.badge}">${BADGE_MAP[p.badge] || p.badge}</span>` : ''}
        </div>
        <div class="slide-name">${p.name}</div>
        <div class="slide-benefit">${p.benefit}</div>
        <div class="slide-price-row">
          <span class="slide-price">${p.price}</span>
          ${p.orig ? `<span class="slide-orig">${p.orig}</span>` : ''}
          ${p.disc ? `<span class="slide-disc">-${p.disc} OFF</span>` : ''}
        </div>
        <div class="slide-rating">
          <span class="slide-stars">${stars}</span>
          <span style="color:#fff;font-weight:800">${p.rating}</span>
          <span class="slide-reviews">(${p.rev} reviews)</span>
        </div>
        <div class="slide-btns">
          <a class="btn-wmt" href="${wmtUrl(p.wmt)}" target="_blank" rel="nofollow sponsored noopener noreferrer">🛒 Walmart</a>
          <a class="btn-amz" href="${amzUrl(p.amz, p.asin||'')}" target="_blank" rel="nofollow sponsored noopener noreferrer">📦 Amazon</a>
        </div>
        <div class="slide-disclosure">
          As an affiliate, we may earn from qualifying purchases.
          <a href="affiliate-disclosure.html" target="_blank">Disclosure</a>
        </div>
      </div>
    </div>`;
    });
  });

  feed.innerHTML = html;

  // Swipe-up hint on first slide
  const first = feed.querySelector('.slide');
  if (first) {
    first.insertAdjacentHTML('beforeend',
      `<div class="swipe-hint" id="swipe-hint">
         <div class="sh-arrow">↑</div>
         <span>SWIPE UP</span>
       </div>`);
  }

  allSlides = Array.from(feed.querySelectorAll('.slide'));
  setupObserver();
  setupScrollProgress(feed);
}

// ─────────────────────────────────────────────────────────────────────────────
// INTERSECTION OBSERVER – active card + progress
// ─────────────────────────────────────────────────────────────────────────────
function setupObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('active');
        // Hide swipe hint
        const hint = document.getElementById('swipe-hint');
        if (hint && allSlides.indexOf(entry.target) > 0) hint.style.opacity = '0';
        // Sync category pills
        const sec = entry.target.dataset.sec;
        if (sec) {
          document.querySelectorAll('.cat-pill').forEach(el =>
            el.classList.toggle('active', el.dataset.sec === sec)
          );
        }
        currentIdx = allSlides.indexOf(entry.target);
        updateProgress();
      } else {
        entry.target.classList.remove('active');
      }
    });
  }, { threshold: 0.55 });

  allSlides.forEach(el => observer.observe(el));
}

function updateProgress() {
  const pct = allSlides.length > 1 ? (currentIdx / (allSlides.length - 1)) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct.toFixed(1) + '%';
}

function setupScrollProgress(feed) {
  feed.addEventListener('scroll', () => {
    const pct = feed.scrollHeight > feed.clientHeight
      ? (feed.scrollTop / (feed.scrollHeight - feed.clientHeight)) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct.toFixed(1) + '%';
  }, { passive: true });
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function jumpTo(secId) {
  const el = document.getElementById('sec-' + secId);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
}

function shareProduct(idx) {
  const p = PRODUCTS[idx];
  const url = amzUrl(p.amz, p.asin || '');
  if (navigator.share) {
    navigator.share({ title: p.name, text: p.benefit + ' — Only ' + p.price, url })
      .catch(() => {});
  } else {
    try { navigator.clipboard.writeText(url); } catch(_) {}
    showToast('🔗 Link copied to clipboard!');
  }
}

// Keyboard navigation (desktop)
document.addEventListener('keydown', e => {
  const feed = document.getElementById('feed');
  const h = feed.clientHeight;
  if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
    e.preventDefault();
    feed.scrollBy({ top: h, behavior: 'smooth' });
  }
  if (e.key === 'ArrowUp' || e.key === 'PageUp') {
    e.preventDefault();
    feed.scrollBy({ top: -h, behavior: 'smooth' });
  }
});

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
buildFeed();
</script>
</body>
