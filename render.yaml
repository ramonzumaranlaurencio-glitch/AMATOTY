# ─────────────────────────────────────────────────────────────────────────────
#  render.yaml — Raíz del repositorio. Define DOS servicios de producción:
#   1. lca-pro   → backend/main.py  (sistema principal, puerto variable)
#   2. safepay   → safepay/app.py   (microservicio de pagos, puerto variable)
#  Documentación: https://render.com/docs/render-yaml
#
#  ANTES DE HACER DEPLOY: reemplaza los placeholders <TU-*> con tus URLs reales.
#  Ejemplo:
#    SAFEPAY_API_URL  → https://trujillo-safepay-pro.onrender.com
#    ALLOWED_ORIGINS  → https://lca-pro.onrender.com
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. SISTEMA PRINCIPAL (LCA PRO) ──────────────────────────────────────────
  - type: web
    name: lca-pro
    runtime: python
    rootDir: backend                        # gunicorn busca main.py aquí
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    healthCheckPath: /health

    envVars:
      # URL pública de SafePay en Render — SIN barra final
      - key: SAFEPAY_API_URL
        value: "https://trujillo-safepay-pro.onrender.com"   # ← reemplaza si el nombre cambia

      # Cloudinary — sube imágenes a la nube (filesystem de Render es efímero)
      - key: CLOUDINARY_URL
        sync: false          # configúrala en Render → lca-pro → Environment

      # Gemini para análisis de imágenes
      - key: GEMINI_API_KEY
        sync: false

      # Clave secreta Flask
      - key: SECRET_KEY
        generateValue: true

      # CORS: permite llamadas desde el propio dominio de Render
      - key: ALLOWED_ORIGINS
        value: "https://lca-pro.onrender.com,https://trujillo-safepay-pro.onrender.com"

  # ── 2. SAFEPAY (microservicio de pagos) ─────────────────────────────────────
  - type: web
    name: trujillo-safepay-pro
    runtime: python
    rootDir: safepay                        # gunicorn busca app.py aquí
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    healthCheckPath: /health

    envVars:
      # PostgreSQL — Render inyecta la cadena de conexión desde la BD
      - key: DATABASE_URL
        fromDatabase:
          name: safepay-db
          property: connectionString

      # Pasarela de pago: "stripe" en producción, "manual" para pruebas
      - key: PAYMENT_PROVIDER
        value: stripe

      # Claves Stripe — configúralas en Render → Environment (NUNCA en el código)
      - key: PAYMENT_SECRET_KEY
        sync: false          # sk_live_...  (Stripe Dashboard → API Keys)

      - key: PAYMENT_PUBLIC_KEY
        sync: false          # pk_live_...

      - key: WEBHOOK_SECRET
        sync: false          # whsec_...   (Stripe Dashboard → Webhooks)

      # Clave secreta Flask
      - key: SECRET_KEY
        generateValue: true

      # CORS: solo permite llamadas desde el sistema principal
      - key: ALLOWED_ORIGINS
        value: "https://lca-pro.onrender.com"

databases:
  - name: safepay-db
    databaseName: safepay
    user: safepay_user
    plan: free
    region: oregon
