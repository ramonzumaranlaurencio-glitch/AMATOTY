# ─────────────────────────────────────────────────────────────────────────────
#  render.yaml — Configuración de despliegue en Render.com
#
#  SafePay está en la subcarpeta safepay/ del repo principal.
#  Render usará rootDir para ejecutar todo desde ahí.
#
#  Documentación: https://render.com/docs/render-yaml
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: trujillo-safepay-pro
    runtime: python
    rootDir: safepay                        # ← Render trabaja desde safepay/
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    healthCheckPath: /health

    envVars:
      # PostgreSQL — Render inyecta DATABASE_URL automáticamente desde la BD
      - key: DATABASE_URL
        fromDatabase:
          name: safepay-db
          property: connectionString

      # Pasarela de pago
      - key: PAYMENT_PROVIDER
        value: manual              # Cambia a "stripe" cuando tengas las claves

      # Secrets — configura estos en Render → Environment (NO los pongas aquí)
      - key: PAYMENT_SECRET_KEY
        sync: false

      - key: PAYMENT_PUBLIC_KEY
        sync: false

      - key: WEBHOOK_SECRET
        sync: false

      # BASE_URL: Render inyecta RENDER_EXTERNAL_URL automáticamente.
      # app.py la lee solo — no necesita configurarse aquí.
      # Si quieres sobreescribirla manualmente, descomenta:
      # - key: BASE_URL
      #   value: https://trujillo-safepay-pro.onrender.com

      # Clave secreta Flask
      - key: SECRET_KEY
        generateValue: true

      # CORS: agrega aquí la URL pública de tu LCA PRO cuando lo despliegues
      - key: ALLOWED_ORIGINS
        value: "http://127.0.0.1:5050,http://localhost:5050"

databases:
  - name: safepay-db
    databaseName: safepay
    user: safepay_user
    plan: free
    region: oregon

