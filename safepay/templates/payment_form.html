{% extends "base.html" %}
{% block title %}New Payment · SafePay PRO{% endblock %}

{% block content %}
<div class="page-header">
  <h1>💳 Register New Payment</h1>
  <p>Manual payment form</p>
</div>

<div class="card card-narrow">
  <form method="POST" action="/payment/new">
    <div class="form-group">
      <label>Customer / Name</label>
      <input type="text" name="customer" placeholder="E.g.: John Smith" class="form-input">
    </div>

    <div class="form-group">
      <label>Customer Email</label>
      <input type="email" name="customer_email" placeholder="customer@email.com" class="form-input">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Amount *</label>
        <input type="number" name="amount" step="0.01" min="0.01" required
               placeholder="0.00" class="form-input">
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select name="currency" class="form-input">
          {% for c in currencies %}
          <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Payment Method *</label>
      <select name="method" class="form-input" required>
        {% for m in methods %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="3" class="form-input"
                placeholder="E.g.: Payment for product XYZ"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-block">Register Payment</button>
      <a href="/dashboard" class="btn btn-outline btn-block">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
